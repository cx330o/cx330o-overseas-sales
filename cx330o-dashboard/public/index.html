// ===== State =====
let currentLang = localStorage.getItem('cx-lang') || 'zh';
let currentTheme = localStorage.getItem('cx-theme') || 'dark';

// ===== Render =====
function t(key) { return I18N[currentLang]?.[key] || I18N.zh[key] || key; }

function renderCard(c) {
  const d = c[currentLang] || c.zh;
  const tagClass = c.isNew ? 'cx-tag-new' : 'cx-tag';
  const onclick = c.action === 'embed' ? `openService('${c.id}')` : `openDetail('${c.id}')`;
  const right = c.port
    ? `<span class="cx-port">${c.port}</span>`
    : (d.hint ? `<span class="cx-cli-hint">${d.hint}</span>` : '');
  return `<div class="cx-card" style="--accent:linear-gradient(90deg,${c.accent});" onclick="${onclick}">
    <div class="cx-card-icon">${c.icon}</div>
    <h3>${d.name}</h3>
    <div class="cx-card-desc">${d.desc}</div>
    <div class="cx-card-meta"><span class="${tagClass}">${d.tag}</span>${right}</div>
  </div>`;
}

function renderFlow() {
  const steps = t('flow');
  const nums = ['①','②','③','④','⑤','⑥','⑦','⑧'];
  document.getElementById('flowBar').innerHTML = steps.map((s, i) =>
    (i ? '<span class="cx-flow-arrow">→</span>' : '') +
    `<div class="cx-flow-step"><span>${nums[i]}</span>${s}</div>`
  ).join('');
}

function renderAll() {
  // i18n text nodes
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Flow
  renderFlow();
  // Grids
  document.getElementById('coreGrid').innerHTML = CARDS.core.map(renderCard).join('');
  document.getElementById('dealGrid').innerHTML = CARDS.deal.map(renderCard).join('');
  document.getElementById('growthGrid').innerHTML = CARDS.growth.map(renderCard).join('');
  document.getElementById('commGrid').innerHTML = CARDS.comm.map(renderCard).join('');
  document.getElementById('complianceGrid').innerHTML = CARDS.compliance.map(renderCard).join('');
  // Lang buttons
  document.querySelectorAll('.cx-lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === {zh:'中文',en:'EN',ja:'日本語'}[currentLang]);
  });
}

// ===== Language =====
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('cx-lang', lang);
  document.documentElement.lang = {zh:'zh-CN',en:'en',ja:'ja'}[lang];
  renderAll();
}

// ===== Theme =====
function applyTheme() {
  document.documentElement.setAttribute('data-theme', currentTheme);
  const toggle = document.getElementById('themeToggle');
  const label = document.getElementById('themeLabel');
  if (currentTheme === 'light') {
    toggle.classList.add('light');
    label.textContent = '☀️';
  } else {
    toggle.classList.remove('light');
    label.textContent = '🌙';
  }
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('cx-theme', currentTheme);
  applyTheme();
}

// ===== Navigation =====
function openService(svc) { window.location.href = '/embed.html?svc=' + svc; }
function openDetail(svc) { window.location.href = '/detail.html?svc=' + svc; }

// ===== Status =====
async function checkStatus() {
  try {
    const res = await fetch('/api/status');
    const svcs = await res.json();
    document.getElementById('statusBar').innerHTML = svcs.map(s =>
      `<div class="cx-status-dot"><span class="cx-dot cx-dot-${s.status}"></span>${s.name}</div>`
    ).join('');
  } catch {
    document.getElementById('statusBar').innerHTML =
      `<div class="cx-status-dot"><span class="cx-dot cx-dot-offline"></span>${t('status_fail')}</div>`;
  }
}

// ===== Init =====
applyTheme();
renderAll();
checkStatus();
setInterval(checkStatus, 15000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
