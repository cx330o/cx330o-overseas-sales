worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 50m;

    upstream dashboard_be { server host.docker.internal:9090; }
    upstream flow_be      { server host.docker.internal:5678; }
    upstream analytics_be { server host.docker.internal:3030; }
    upstream crm_be       { server host.docker.internal:3000; }

    # :80 → Dashboard
    server {
        listen 80;

        location = /_auth {
            internal;
            proxy_pass              http://dashboard_be/api/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        location /login      { proxy_pass http://dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /login.html { proxy_pass http://dashboard_be; }
        location /api/login  { proxy_pass http://dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/logout { proxy_pass http://dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/me     { proxy_pass http://dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/       { proxy_pass http://dashboard_be; proxy_set_header Cookie $http_cookie; }

        location / {
            auth_request /_auth;
            error_page 401 = /login;
            proxy_pass http://dashboard_be;
            proxy_set_header Cookie $http_cookie;
        }
    }

    # :81 → FlowEngine (protected by dashboard auth)
    server {
        listen 81;

        location = /_auth {
            internal;
            proxy_pass              http://dashboard_be/api/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        location / {
            auth_request     /_auth;
            auth_request_set $flow_auth $upstream_http_x_flow_auth;
            error_page 401 = @login_redirect;

            proxy_set_header Cookie $flow_auth;
            proxy_pass http://flow_be;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        location @login_redirect {
            return 302 http://$hostname/login;
        }
    }

    # :82 → Analytics (protected by dashboard auth)
    server {
        listen 82;

        location = /_auth {
            internal;
            proxy_pass              http://dashboard_be/api/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        location / {
            auth_request     /_auth;
            auth_request_set $analytics_session $upstream_http_x_analytics_session;
            error_page 401 = @login_redirect;

            proxy_set_header X-Metabase-Session $analytics_session;
            proxy_pass http://analytics_be;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location @login_redirect {
            return 302 http://$hostname/login;
        }
    }

    # :83 → CRM (protected by dashboard auth)
    server {
        listen 83;

        location = /_auth {
            internal;
            proxy_pass              http://dashboard_be/api/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        location / {
            auth_request     /_auth;
            auth_request_set $crm_auth $upstream_http_x_crm_auth;
            error_page 401 = @login_redirect;

            proxy_set_header Cookie $crm_auth;
            proxy_pass http://crm_be;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        location @login_redirect {
            return 302 http://$hostname/login;
        }
    }
}
