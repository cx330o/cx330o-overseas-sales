worker_processes 1;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    client_max_body_size 50m;

    resolver 127.0.0.11 valid=10s ipv6=off;

    # Single port :80 — all services via path-based routing
    server {
        listen 80;

        # Dynamic DNS variables (allows nginx to start even if services aren't ready yet)
        set $dashboard_be http://dashboard:9090;
        set $flow_be      http://flowengine:5678;
        set $analytics_be http://analytics:3000;
        set $crm_be       http://crm:3000;
        set $docuseal_be  http://docuseal:3000;
        set $hyperswitch_be http://hyperswitch-control-center:9000;
        set $growthbook_be http://growthbook:3000;
        set $mirotalk_be  http://mirotalk:3000;

        # === Auth subrequest ===
        location = /_auth {
            internal;
            proxy_pass              $dashboard_be/api/me;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Cookie $http_cookie;
        }

        # === Dashboard (public routes) ===
        location /login      { proxy_pass $dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /login.html { proxy_pass $dashboard_be; }
        location /api/login  { proxy_pass $dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/logout { proxy_pass $dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/me     { proxy_pass $dashboard_be; proxy_set_header Cookie $http_cookie; }
        location /api/       { proxy_pass $dashboard_be; proxy_set_header Cookie $http_cookie; }

        # === FlowEngine at /flow/ ===
        location /flow/ {
            auth_request /_auth;
            auth_request_set $flow_auth $upstream_http_x_flow_auth;
            error_page 401 = /login;

            proxy_set_header Cookie $flow_auth;
            proxy_pass $flow_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # === Analytics at /analytics/ ===
        location /analytics/ {
            auth_request /_auth;
            auth_request_set $analytics_session $upstream_http_x_analytics_session;
            error_page 401 = /login;

            proxy_set_header X-Metabase-Session $analytics_session;
            proxy_pass $analytics_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # === CRM at /crm/ ===
        location /crm/ {
            auth_request /_auth;
            auth_request_set $crm_auth $upstream_http_x_crm_auth;
            error_page 401 = /login;

            proxy_set_header Cookie $crm_auth;
            proxy_pass $crm_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # === DocuSeal (E-Signature) at /contracts/ ===
        location /contracts/ {
            auth_request /_auth;
            error_page 401 = /login;

            proxy_pass $docuseal_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # === Hyperswitch (Payments) at /payments/ ===
        location /payments/ {
            auth_request /_auth;
            error_page 401 = /login;

            proxy_pass $hyperswitch_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # === GrowthBook (A/B Testing) at /experiments/ ===
        location /experiments/ {
            auth_request /_auth;
            error_page 401 = /login;

            proxy_pass $growthbook_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }

        # === MiroTalk (Video Calls) at /voip/ ===
        location /voip/ {
            auth_request /_auth;
            error_page 401 = /login;

            proxy_pass $mirotalk_be/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_buffering off;
        }

        # === Dashboard (protected, catch-all) ===
        location / {
            auth_request /_auth;
            error_page 401 = /login;
            proxy_pass $dashboard_be;
            proxy_set_header Cookie $http_cookie;
        }
    }

    # Port-based access as fallback (direct access)
    server {
        listen 81;
        set $flow_upstream http://flowengine:5678;
        location / {
            proxy_pass $flow_upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }

    server {
        listen 82;
        set $analytics_upstream http://analytics:3000;
        location / {
            proxy_pass $analytics_upstream;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 83;
        set $crm_upstream http://crm:3000;
        location / {
            proxy_pass $crm_upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }

    server {
        listen 84;
        set $docuseal_upstream http://docuseal:3000;
        location / {
            proxy_pass $docuseal_upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }

    server {
        listen 85;
        set $hyperswitch_upstream http://hyperswitch-control-center:9000;
        location / {
            proxy_pass $hyperswitch_upstream;
            proxy_set_header Host $host;
        }
    }

    server {
        listen 86;
        set $growthbook_upstream http://growthbook:3000;
        location / {
            proxy_pass $growthbook_upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }

    server {
        listen 87;
        set $mirotalk_upstream http://mirotalk:3000;
        location / {
            proxy_pass $mirotalk_upstream;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
            proxy_buffering off;
        }
    }
}
